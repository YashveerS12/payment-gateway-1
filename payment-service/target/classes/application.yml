server:
  port: 8081

spring:
  application:
    name: payment-service

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paymentdb}
    username: ${SPRING_DATASOURCE_USERNAME:payment_user}
    password: ${SPRING_DATASOURCE_PASSWORD:payment_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ─────────────────────────────────────────
  # JPA / Hibernate
  # ─────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms

  # ─────────────────────────────────────────
  # Kafka
  # ─────────────────────────────────────────
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: all

  # ─────────────────────────────────────────
  # Disable Spring Security default login
  # ─────────────────────────────────────────
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ─────────────────────────────────────────
# Kafka Topics
# ─────────────────────────────────────────
kafka:
  topics:
    payment-initiated: payment.initiated
    payment-completed: payment.completed
    payment-failed: payment.failed

# ─────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging:
  level:
    com.paymentgateway: DEBUG
    org.springframework.kafka: INFO