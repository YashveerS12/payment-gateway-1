server:
  port: 8080

spring:
  application:
    name: api-gateway

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paymentdb}
    username: ${SPRING_DATASOURCE_USERNAME:payment_user}
    password: ${SPRING_DATASOURCE_PASSWORD:payment_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  # ─── Email (Gmail SMTP) ───────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:yashveersingh132900@gmail.com}
    password: ${MAIL_PASSWORD:cjxv tmvx qkpc lvmy}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-please}
  expiration-ms: 86400000

# ─── Service URLs ───────────────────────────
payment-service:
  url: ${PAYMENT_SERVICE_URL:http://localhost:8081}

recon-service:
  url: ${RECON_SERVICE_URL:http://localhost:8082}

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://localhost:3002}

# ─── Rate limiting ───────────────────────────
rate-limit:
  default-requests-per-minute: 100

# ─── Actuator ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─── Logging ────────────────────────────────
logging:
  level:
    com.paymentgateway: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO