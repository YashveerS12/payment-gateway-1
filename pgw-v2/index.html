<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayGateway · Merchant Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #FAFAF9;
        color: #0A0A0A;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      button, input, select, textarea { font-family: inherit; }
      a { color: inherit; }

      /* Scrollbar — minimal, tasteful */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 999px; border: 2px solid #FAFAF9; }
      ::-webkit-scrollbar-thumb:hover { background: #A8A29E; }

      /* Hide number input spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type="number"] { -moz-appearance: textfield; }

      /* Selection */
      ::selection { background: #C7D2FE; color: #0A0A0A; }

      /* Ambient dotted grid backdrop — used on auth screens */
      .pg-dotgrid {
        background-color: #FAFAF9;
        background-image: radial-gradient(circle, #D6D3D1 1px, transparent 1px);
        background-size: 28px 28px;
      }
      .pg-fade-radial {
        background: radial-gradient(ellipse 60% 60% at 50% 50%, transparent 0%, #FAFAF9 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
